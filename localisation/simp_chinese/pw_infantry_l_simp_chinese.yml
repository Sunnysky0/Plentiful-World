﻿l_simp_chinese:
 pw_infantry_weapons0:0 "模块化突击步枪"
 pw_infantry_weapons0_desc:0 "采用6.8mm埋头弹与智能瞄具的一体化单兵平台，强调通用压制与快速部署。"
 pw_infantry_weapons1:0 "智能追踪子弹步枪"
 pw_infantry_weapons1_desc:0 "通过微型制导弹药实现曲射与拐弯射击，显著提升复杂地形杀伤效率。"
 pw_infantry_weapons2:0 "便携式高斯步枪"
 pw_infantry_weapons2_desc:0 "以电磁加速弹丸替代传统火药推进，在反装甲与穿透火力上实现代际跃迁。"
 pw_infantry_weapons3:0 "ZB vz.26"
 pw_infantry_weapons3_desc:0 "1942式班用自动火力体系，显著提升持续压制与机动防御效率。"
 pw_infantry_weapons4:0 "次世代高斯步枪"
 pw_infantry_weapons4_desc:0 "引入高能线圈与智能供能管理，进一步强化持续火力与射击稳定性。"
 pw_infantry_weapons5:0 "可追踪高斯步枪"
 pw_infantry_weapons5_desc:0 "高斯武器与末段制导融合，赋予步兵远距离点杀与机动目标拦截能力。"

 pw_support_weapons1:0 "单兵云爆弹发射器"
 pw_support_weapons1_desc:0 "1940式支援武器学说升级，完善云爆弹投送与巷战压制流程。"
 pw_support_weapons2:0 "微型电磁迫击炮"
 pw_support_weapons2_desc:0 "1943式支援火力改进，强化反器材与反装甲条件下的步兵火力组织。"
 pw_support_weapons3:0 "费洛蒙毒气喷射器"
 pw_support_weapons3_desc:0 "1948式特种化学压制体系，强调区域控制与敌方士气打击。"

 infantry_equipment_1:0 "模块化突击步枪"
 infantry_equipment_1_short:0 "模块化步枪"
 infantry_equipment_1_desc:0 "1936式单兵武器，标准化模块结构便于规模化维护与快速换装。"
 infantry_equipment_2:0 "智能追踪子弹步枪"
 infantry_equipment_2_short:0 "追踪步枪"
 infantry_equipment_2_desc:0 "1939式智能弹药平台，强化命中率与复杂环境下的战术灵活性。"
 infantry_equipment_3:0 "便携式高斯步枪"
 infantry_equipment_3_short:0 "便携高斯步枪"
 infantry_equipment_3_desc:0 "1942式便携高斯系统，对轻装甲和掩体具有更强穿透能力。"
 infantry_equipment_4:0 "次世代高斯步枪"
 infantry_equipment_4_short:0 "次世代高斯"
 infantry_equipment_4_desc:0 "1946式高斯步枪，优化供能与散热，显著提升中距离持续作战能力。"
 infantry_equipment_5:0 "可追踪高斯步枪"
 infantry_equipment_5_short:0 "追踪高斯步枪"
 infantry_equipment_5_desc:0 "1951式制导高斯步枪，具备高精度远射与机动目标压制性能。"

