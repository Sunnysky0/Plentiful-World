 CHI_Li_Linfu:0 "李林甫"
 CHI_Li_Linfu_desc:0 "作为帝国的内阁总理，李林甫是这个庞大机器实际的操控者。她身着那件标志性的特制露乳蕾丝女仆装——这不仅是皇帝怪癖的体现，更是她权力的象征。在朝堂之上，她以“口蜜腹剑”著称，每一个微笑背后都藏着致命的匕首，无数政敌在她的温柔陷阱中家破人亡。在深宫之中，她是皇帝“能源仪式”的首席管理者与顺从的“活体电池”，用自己的尊严与肉体换取了对皇权的绝对代理。任何试图觐见皇帝的人，都必须先通过她的“身体检查”。她是帝国腐朽与辉煌的共生体，也是这个赛博封建王朝最艳丽的毒花。"
 trait_CHI_Li_Linfu:0 "帝国女仆长"
 trait_CHI_Li_Linfu_desc:0 "身着特制的露乳蕾丝女仆装，她是帝国权力的实际执行者，也是皇帝“能源仪式”的首席管理者。在朝堂上，她以“口蜜腹剑”的政治手腕铲除异己；在深宫中，她则是皇帝最顺从的“活体电池”与发泄工具。她通过出卖肉体与尊严换取了对朝政的绝对把控，任何试图接近皇帝的人都必须先经过她的“身体检查”。"
 CHI_Banquet_of_Splendid_Years:0 "华年之宴会"
 CHI_Banquet_of_Splendid_Years_desc:0 "在这所谓的“盛世”即将落幕之际，内阁总理李林甫决定举办一场史无前例的宏大宴会——“华年之宴”。这不仅是为了庆祝皇帝的寿辰，更是为了向国内外展示中华帝国的繁荣与“欲望结晶”技术的辉煌成果。京师的霓虹将被调至最耀眼的粉红，特供的“助燃剂”将如流水般供应，所有的权贵、军阀、买办都将受邀出席。在这场酒池肉林的狂欢中，能量的产出将达到峰值，而李林甫也将借此机会重新分配利益，巩固她摇摇欲坠的统治。然而，在这极致的欢愉之下，暗流涌动，没人知道这场宴会是否会成为帝国最后的晚餐。"
 CHI_event.2.t:0 "风花雪月：总理长逝"
 CHI_event.2.d:0 "华年之宴会的高潮时刻，当满城的全息烟花在夜空中绽放出绚烂的“万岁”字样时，一个震惊帝国的消息从深宫中传出：内阁总理李林甫，在这个她一手策划的巅峰时刻，突然倒在了皇帝的寝宫门前。官方的说法是“因操劳国事，突发心力衰竭”，但坊间流言四起。有人说是她过度参与“能源仪式”导致身体崩溃，有人说是被政敌魏忠贤下毒，还有人说是安禄山的刺客所为，甚至有人传言是她体内的“欲望结晶”过载而自爆。\n\n无论真相如何，这位把持朝政数载、权倾天下的“帝国女仆长”已经离去。随着她的倒下，维持帝国微妙平衡的最后一根支柱断裂了。朝堂上，压抑已久的各方势力瞬间撕破脸皮；地方上，野心勃勃的军阀们开始磨刀霍霍。那件象征着权力的蕾丝女仆装如今空空荡荡，而它留下的权力真空，将由鲜血来填补。\n\n风花雪月终成空，帝国的大厦，将倾。"
 CHI_event.2.a:0 "帝国失去了它的裱糊匠……"