l_simp_chinese:
 CHI_yuan_shikai:0 "袁世凯"
 political_genius:0 "政治精英"
 political_genius_desc:0 "这位领袖拥有卓越的政治才能，能够有效地管理国家。"
 faction_management:0 "派系关系"
 faction_management_desc:0 "这位领袖擅长平衡各方势力，维持国内稳定。"
 CHI_corrupt_military:0 "军队腐败"
 CHI_corrupt_military_desc:0 "帝国的军队已经烂到了骨子里。军官们关心的不是操练，而是如何将配发的“战术兴奋剂（高纯度结晶）”倒卖到黑市，或者将营房改造成收费的“能源采集室”。士兵们大多处于戒断反应或过度亢奋的虚弱状态，空饷现象严重。\n\n§R不能解散或训练新部队\n不能改编部队§!"
 CHI_corrupt_officialdom:0 "行政腐败"
 CHI_corrupt_officialdom_desc:0 "在帝国政府，公文的流转速度取决于你能在床上让上级有多满意，或者你能上贡多少高能晶体。税收的一半都变成了官员私库里的收藏品，导致中央政府永远处于财政赤字状态。"
 CHI_hidden_rules:0 "职场潜规则"
 CHI_hidden_rules_desc:0 "在这个世界，晋升通道与才华无关。无论是工厂还是衙门，下位者必须无条件向位高权重者献出自己的“身心能源”。这种压抑的氛围导致了极高的人员流失率和普遍的消极怠工，但同时也构成了帝国等级森严的维稳基石。"
 CHI_office_lady:0 "中国OL"
 CHI_office_lady_desc:0 "（正面精神） 在腐败的男性官僚和疯狂的军阀之外，帝国的运转实际上是由一群被称为“Office Lady”的精英女性职业阶层维持的。她们精通如何将混乱的欲望高效转化为数据和能源，冷静、理智且高效。"
