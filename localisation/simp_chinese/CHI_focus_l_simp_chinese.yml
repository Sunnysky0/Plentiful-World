l_simp_chinese:
 CHI_Prime_Ministers_Funeral:0 "总理国葬"
 CHI_Prime_Ministers_Funeral_desc:0 "总理的逝世震惊了全国。我们需要妥善安排他的葬礼，以稳定人心，并为接下来的权力交接做好准备。"
 CHI_Cabinet_Secret_Meeting:0 "内阁密会"
 CHI_Cabinet_Secret_Meeting_desc:0 "在葬礼的阴影下，内阁成员们秘密集会，商讨未来的政治走向。"
 CHI_Police_Movement:0 "警察异动"
 CHI_Police_Movement_desc:0 "首都的警察力量开始出现不寻常的调动，似乎有某种势力正在暗中操控。"
 CHI_Connecting_MPs:0 "串联议员"
 CHI_Connecting_MPs_desc:0 "通过私下接触和利益交换，争取更多议员的支持。"
 CHI_Seize_Capital_Media:0 "控制京畿舆论"
 CHI_Seize_Capital_Media_desc:0 "舆论是政治斗争的重要武器。我们必须掌控首都的主要媒体，引导公众舆论。"
 CHI_Bribe_the_Eunuchs:0 "贿赂宫廷内侍"
 CHI_Bribe_the_Eunuchs_desc:0 "宫廷内侍虽然地位不高，但掌握着许多关键信息。通过贿赂他们，我们可以洞悉宫内的动向。"
 CHI_Military_Movement:0 "军队异动"
 CHI_Military_Movement_desc:0 "军队的动向至关重要。我们需要密切关注并尝试影响军队的部署。"
 CHI_Cut_Palace_Energy_Lines:0 "切断皇宫能源管线"
 CHI_Cut_Palace_Energy_Lines_desc:0 "切断皇宫的能源供应，制造混乱，为我们的行动创造机会。"
 CHI_Takeover_Garrison:0 "接管京师卫戍区"
 CHI_Takeover_Garrison_desc:0 "控制京师卫戍区意味着掌握了首都的生杀大权。这是我们计划的关键一步。"
 CHI_event.1.t:0 "帝宫深夜"
 CHI_event.1.d:0 "深夜的帝宫静悄悄，只有远处传来几声乌鸦的啼叫。在这个古老的宫殿里，一场巨大的变革正在酝酿之中..."
 CHI_event.1.a:0 "非常有意思"
